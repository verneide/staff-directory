name: Deploy to SiteGround

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SG_PORT }} ${{ secrets.SG_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy vem-lightspeed
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            wp-content/plugins/vem-lightspeed/ \
            ${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:/home/customer/www/motopowershop.com/public_html/wp-content/plugins/vem-lightspeed/

      - name: Deploy vem-woocommerce
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            wp-content/plugins/vem-woocommerce/ \
            ${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:/home/customer/www/motopowershop.com/public_html/wp-content/plugins/vem-woocommerce/

      - name: Deploy motopowershop-astra
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            wp-content/themes/motopowershop-astra/ \
            ${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:/home/customer/www/motopowershop.com/public_html/wp-content/themes/motopowershop-astra/