name: Deploy to SiteGround

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SG_PORT }} ${{ secrets.SG_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy ve-staff plugin
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            assets/plugins/ve-staff/ \
            ${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:/home/customer/www/staff.eideweb.com/public_html/assets/plugins/ve-staff/

      - name: Deploy vern-eide-staff theme
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SG_PORT }}" \
            assets/themes/vern-eide-staff/ \
            ${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:/home/customer/www/staff.eideweb.com/public_html/assets/themes/vern-eide-staff/
